<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        nav{
            height: 100px;
            width: 100px;
            box-shadow: 2px black;
        }
        ul{
            position: relative;
        }
        li:nth-child(1){
            box-shadow: 1px 1px 1px 1px black;
            padding: 7%;
        }
        li:nth-child(2){
            position: absolute;
            left: 100px;
            bottom: -15px;
            color: blueviolet;
            padding: 15%;
            background-color: aqua;
        }
        li:nth-child(3){
            position: absolute;
            left: 175px;
            bottom: -10px;
            color: yellow;
            background-color: black;
            padding: 10%;
        }
        li:nth-child(4){
            position: absolute;
            left: 250px;
            bottom: -24px;
            color: green;
            padding: 25%;
            background-color: blue;
        }
    </style>
</head>
<body>
    <nav>
        <h1>lista</h1>
        <ul>
            <li>um</li>
            <li>dois</li>
            <li>tres</li>
            <li>quatro</li>
        </ul>
    </nav>
</body>
</html>
