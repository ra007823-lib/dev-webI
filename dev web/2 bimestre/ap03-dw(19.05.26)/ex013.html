<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        nav{
            height: 250px;
            width: 150px;
        }
        li{
            list-style: none;
        }
        li:nth-child(1){
            padding: 5px;
        }
        li:nth-child(2){
            padding: 7px;
        }
        li:nth-child(3){
            padding: 9px;
        }
        li:nth-child(4){
            padding: 11px;
        }
        li:nth-child(5){
            padding: 13px;
        }
        li:nth-child(1):hover{
            background-color: green;
        }
        li:nth-child(2):hover{
            background-color: yellow;
        }
        li:nth-child(3):hover{
            background-color: blue;
        }
        li:nth-child(4):hover{
            background-color: pink;
        }
        li:nth-child(5):hover{
            background-color: red;
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li>item1</li>
            <li>item2</li>
            <li>item3</li>
            <li>item4</li>
            <li>item5</li>
        </ul>
    </nav>
</body>
</html>
