<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Index</title>
    <style>
        div {
            border: 2px solid black;
            position: absolute;
        }

        div.um {
            width: 200px;
            height: 80px;
            background: #cff;
            z-index: 3;
        }

        div.dois {
            width: 110px;
            height: 120px;
            left: 120px;
            top: 20px;
            background: #6f9;
            z-index: 2;
        }

        div.tres {
            width: 90px;
            height: 60px;
            left: 70px;
            top: 50px;
            background: #fcf;
            z-index: 1;
        }
    </style>
</head>

<body>
    <div class="um">div um</div>
    <div class="dois">div dois</div>
    <div class="tres">div tres</div>
</body>

</html>
